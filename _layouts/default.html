<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}Yang Lin</title>
  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="/index.html#hero">Yang Lin</a>
      <nav>
        <a class="nav-link{% if page.url == '/' or page.url == '/index.html' %} active{% endif %}" href="/index.html#about">About</a>
        <a class="nav-link{% if page.url == '/projects/' %} active{% endif %}" href="/projects/">Projects</a>
        <a class="nav-link{% if page.url == '/writing/' or page.layout == 'post' %} active{% endif %}" href="/writing/">Writing</a>
        <a class="nav-link" href="/index.html#contact">Contact</a>
      </nav>
      <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© 2026 Yang Lin</p>
      <p>Built with GitHub Pages</p>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
